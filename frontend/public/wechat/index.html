<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号 - Conscient</title>
    <link rel="icon" type="image/png" href="../tx.png">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            color: #101014;
            background:
                linear-gradient(135deg, rgba(40, 88, 255, 0.08), transparent 30%),
                linear-gradient(180deg, #fbfcff 0%, #f4f7fb 52%, #ffffff 100%);
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        .top-nav {
            background: rgba(255, 255, 255, 0.86);
            border-bottom: 1px solid rgba(20, 20, 28, 0.08);
            box-shadow: 0 12px 36px rgba(24, 18, 48, 0.08);
        }

        .nav-logo .letter-red { color: #720eec; }
        .nav-logo .letter-yellow { color: #4f8dff; }
        .nav-logo .letter-blue { color: #5ab8ff; }
        .nav-logo .letter-black { color: #121218; }

        .nav-item {
            color: rgba(18, 18, 24, 0.62);
        }

        .nav-item:hover {
            color: #121218;
            background: rgba(114, 14, 236, 0.08);
        }

        .nav-toggle {
            color: #720eec;
        }

        .wechat-page {
            width: min(1160px, calc(100% - 40px));
            margin: 0 auto;
            padding: 92px 0 72px;
        }

        .wechat-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
            gap: 44px;
            align-items: center;
            min-height: 470px;
        }

        .hero-copy {
            max-width: 720px;
        }

        .wechat-kicker {
            width: fit-content;
            border: 1px solid rgba(28, 63, 170, 0.16);
            border-radius: 999px;
            padding: 7px 11px;
            color: #2858ff;
            background: rgba(255, 255, 255, 0.72);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.18rem;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .wechat-title {
            font-size: clamp(3.2rem, 7vw, 6.2rem);
            line-height: 0.98;
            letter-spacing: 0;
            margin: 0 0 20px;
            color: #121218;
        }

        .wechat-intro {
            max-width: 620px;
            color: rgba(18, 18, 24, 0.66);
            font-size: 1rem;
            line-height: 1.85;
            margin: 0;
        }

        .reader-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 28px;
        }

        .reader-pill {
            border: 1px solid rgba(20, 20, 28, 0.08);
            border-radius: 999px;
            padding: 9px 13px;
            color: rgba(18, 18, 24, 0.68);
            background: rgba(255, 255, 255, 0.74);
            font-size: 0.9rem;
        }

        .side-stack {
            display: grid;
            gap: 14px;
        }

        .admin-console {
            display: grid;
            gap: 14px;
            border: 1px solid rgba(20, 20, 28, 0.08);
            border-radius: 8px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 18px 48px rgba(25, 35, 70, 0.1);
            backdrop-filter: blur(16px);
        }

        .admin-panel,
        .account-panel {
            border: 1px solid rgba(20, 20, 28, 0.08);
            border-radius: 8px;
            padding: 18px;
            background: #fff;
        }

        .panel-label {
            margin: 0 0 7px;
            color: #2858ff;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.14rem;
            text-transform: uppercase;
        }

        .admin-panel h2,
        .account-panel h2 {
            font-size: 1.15rem;
            margin: 0;
        }

        .account-panel {
            display: grid;
            gap: 14px;
        }

        .account-status {
            color: rgba(18, 18, 24, 0.64);
            font-size: 0.94rem;
            line-height: 1.7;
            margin: 0;
        }

        .account-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .account-card {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(20, 20, 28, 0.08);
            border-radius: 8px;
            padding: 12px;
            background: #f7f9fc;
        }

        .account-avatar,
        .account-avatar-fallback {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #121218;
            color: #fff;
            object-fit: cover;
            display: grid;
            place-items: center;
            font-weight: 900;
        }

        .account-name {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
            font-weight: 900;
            color: #121218;
        }

        .role-badge {
            border-radius: 999px;
            padding: 3px 8px;
            color: #fff;
            background: #2858ff;
            font-size: 0.72rem;
            font-weight: 900;
        }

        .role-badge.user {
            color: rgba(18, 18, 24, 0.72);
            background: rgba(20, 20, 28, 0.08);
        }

        .account-note {
            color: rgba(18, 18, 24, 0.58);
            font-size: 0.88rem;
            line-height: 1.55;
        }

        .github-login-btn,
        .logout-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 10px;
            padding: 10px 15px;
            color: #fff;
            background: #121218;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .github-login-btn:hover,
        .logout-btn:hover,
        .upload-form button:hover {
            transform: translateY(-1px);
        }

        .logout-btn {
            color: #121218;
            background: rgba(20, 20, 28, 0.08);
        }

        .upload-form {
            display: grid;
            gap: 11px;
            margin-top: 14px;
        }

        .form-row {
            display: grid;
            gap: 6px;
        }

        .form-row span {
            color: rgba(18, 18, 24, 0.66);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .upload-form input,
        .upload-form textarea {
            width: 100%;
            border: 1px solid rgba(20, 20, 28, 0.1);
            border-radius: 8px;
            padding: 10px 11px;
            color: #121218;
            background: #fbfcff;
            font: inherit;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .upload-form input:focus,
        .upload-form textarea:focus {
            border-color: rgba(40, 88, 255, 0.42);
            box-shadow: 0 0 0 3px rgba(40, 88, 255, 0.12);
        }

        .upload-form textarea {
            min-height: 72px;
            resize: vertical;
        }

        .upload-form input::file-selector-button,
        .upload-form button {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 800;
            color: #fff;
            background: #2858ff;
            cursor: pointer;
        }

        .upload-form button {
            width: fit-content;
        }

        .upload-status {
            min-height: 24px;
            color: rgba(18, 18, 24, 0.58);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .article-section {
            margin-top: 36px;
        }

        .section-heading {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 26px;
        }

        .section-heading h2 {
            font-size: clamp(2rem, 4vw, 3.8rem);
            margin: 0;
        }

        .section-heading span {
            color: #2858ff;
            font-size: 0.92rem;
            letter-spacing: 0.12rem;
            text-transform: uppercase;
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .article-card {
            min-height: 230px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 22px;
            border-radius: 8px;
            border: 1px solid rgba(20, 20, 28, 0.08);
            background: rgba(255, 255, 255, 0.86);
            text-decoration: none;
            color: #121218;
            box-shadow: 0 18px 44px rgba(25, 35, 70, 0.07);
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: rgba(40, 88, 255, 0.2);
            background: #fff;
            box-shadow: 0 22px 52px rgba(25, 35, 70, 0.11);
        }

        .article-card-link {
            color: inherit;
            text-decoration: none;
        }

        .article-meta {
            color: #2858ff;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08rem;
        }

        .article-card h3 {
            font-size: 1.42rem;
            line-height: 1.35;
            margin: 28px 0 14px;
        }

        .article-card p,
        .empty-state {
            color: rgba(18, 18, 24, 0.58);
            line-height: 1.75;
            margin: 0;
        }

        .article-arrow {
            margin-top: 32px;
            color: #2858ff;
            font-weight: 800;
        }

        .article-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-top: 28px;
        }

        .delete-article-btn {
            border: 1px solid rgba(185, 28, 28, 0.24);
            border-radius: 999px;
            padding: 9px 15px;
            color: #fff;
            background: #dc2626;
            box-shadow: 0 10px 24px rgba(220, 38, 38, 0.22);
            font-weight: 800;
            cursor: pointer;
        }

        .delete-article-btn:hover {
            color: #fff;
            background: #b91c1c;
            transform: translateY(-1px);
        }

        @media (max-width: 900px) {
            .wechat-hero,
            .article-grid {
                grid-template-columns: 1fr;
            }

            .wechat-hero {
                min-height: auto;
            }

            .wechat-page {
                padding-top: 88px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-hover-zone" id="navHoverZone"></div>
    <nav class="top-nav collapsed" id="globalNav">
        <div class="nav-left">
            <span class="nav-logo">
                <span class="letter-red">C</span><span class="letter-yellow">o</span><span class="letter-blue">n</span><span class="letter-black">s</span><span class="letter-red">c</span><span class="letter-yellow">i</span><span class="letter-blue">e</span><span class="letter-black">n</span><span class="letter-red">t</span>
            </span>
        </div>
        <div class="nav-center">
            <div class="nav-item" onclick="window.location.href='../index.html#section2'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </span>
                <span class="nav-text">主页</span>
            </div>
            <div class="nav-item" onclick="window.location.href='../friends/'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </span>
                <span class="nav-text">友链</span>
            </div>
            <div class="nav-item" onclick="window.location.href='../about/'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <span class="nav-text">关于</span>
            </div>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="折叠导航" style="display: none;">﹀</button>
    </nav>

    <main class="wechat-page">
        <section class="wechat-hero">
            <div class="hero-copy">
                <div class="wechat-kicker">WeChat Reader MVP</div>
                <h1 class="wechat-title">公众号</h1>
                <p class="wechat-intro">
                    这里现在是一个本地文章阅读器。上传一篇不包含评论点赞区的 HTML，后端会保存正文和文章元数据，读者可以从下方列表进入阅读页。
                </p>
                <div class="reader-pills" aria-label="阅读器状态">
                    <span class="reader-pill">公开阅读</span>
                    <span class="reader-pill">GitHub 管理员发布</span>
                    <span class="reader-pill">微信图片本地化</span>
                </div>
            </div>
            <aside class="admin-console">
                <div class="account-panel" id="accountPanel">
                    <p class="panel-label">Access</p>
                    <h2>GitHub 账号</h2>
                    <div class="account-status" id="accountStatus">正在检查登录状态...</div>
                    <div class="account-actions" id="accountActions"></div>
                </div>
                <aside class="admin-panel" id="adminPanel" hidden>
                    <p class="panel-label">Publish</p>
                    <h2>上传文章 HTML</h2>
                    <form class="upload-form" id="uploadForm">
                        <label class="form-row">
                            <span>标题</span>
                            <input id="articleTitle" name="title" type="text" placeholder="文章标题" required>
                        </label>
                        <label class="form-row">
                            <span>Slug</span>
                            <input id="articleSlug" name="slug" type="text" placeholder="英文 slug，可留空自动生成">
                        </label>
                        <label class="form-row">
                            <span>摘要</span>
                            <textarea id="articleSummary" name="summary" placeholder="可留空，后端会从正文生成"></textarea>
                        </label>
                        <label class="form-row">
                            <span>HTML 文件</span>
                            <input id="articleFile" name="file" type="file" accept=".html,text/html" required>
                        </label>
                        <button type="submit">上传并发布</button>
                        <div class="upload-status" id="uploadStatus"></div>
                    </form>
                </aside>
            </aside>
        </section>

        <section class="article-section">
            <div class="section-heading">
                <h2>已发表文章</h2>
                <span>Published</span>
            </div>
            <div class="article-grid" id="articleGrid"></div>
            <p class="empty-state" id="emptyState" hidden>还没有文章。先在上方上传一篇 HTML 试试。</p>
        </section>
    </main>

    <script src="../script.js"></script>
    <script>
        const grid = document.getElementById('articleGrid');
        const emptyState = document.getElementById('emptyState');
        const statusEl = document.getElementById('uploadStatus');
        const form = document.getElementById('uploadForm');
        const adminPanel = document.getElementById('adminPanel');
        const accountStatus = document.getElementById('accountStatus');
        const accountActions = document.getElementById('accountActions');
        let currentUser = null;
        let isAdmin = false;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(value) {
            if (!value) return '未注明日期';
            return new Date(value).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        function renderArticles(articles) {
            grid.innerHTML = '';
            emptyState.hidden = articles.length > 0;

            articles.forEach(article => {
                const card = document.createElement('article');
                card.className = 'article-card';
                const articleUrl = `../article/?slug=${encodeURIComponent(article.slug)}`;
                const safeTitle = escapeHtml(article.title);
                const safeSummary = escapeHtml(article.summary || '暂无摘要');
                const deleteButton = isAdmin
                    ? `<button class="delete-article-btn" type="button" data-slug="${escapeHtml(article.slug)}" data-title="${safeTitle}">删除</button>`
                    : '';
                card.innerHTML = `
                    <a class="article-card-link" href="${articleUrl}">
                        <div>
                            <div class="article-meta">${formatDate(article.createdAt)} · ${article.localImageCount || 0} 张本地图片</div>
                            <h3>${safeTitle}</h3>
                            <p>${safeSummary}</p>
                        </div>
                    </a>
                    <div class="article-actions">
                        <a class="article-arrow" href="${articleUrl}">阅读 →</a>
                        ${deleteButton}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderAccount(adminLogin) {
            adminPanel.hidden = !isAdmin;

            if (!currentUser) {
                accountStatus.innerHTML = `
                    <div class="account-card">
                        <span class="account-avatar-fallback">GH</span>
                        <div>
                            <div class="account-name">未登录</div>
                            <div class="account-note">所有人都可以阅读；只有 ${escapeHtml(adminLogin)} 登录后能上传和删除文章。</div>
                        </div>
                    </div>
                `;
                accountActions.innerHTML = '<a class="github-login-btn no-loader" href="/auth/github">使用 GitHub 登录</a>';
                return;
            }

            const roleText = isAdmin ? '管理员' : '普通用户';
            const roleClass = isAdmin ? 'admin' : 'user';
            const safeLogin = escapeHtml(currentUser.login);
            const avatar = currentUser.avatarUrl
                ? `<img class="account-avatar" src="${escapeHtml(currentUser.avatarUrl)}" alt="${safeLogin} 的 GitHub 头像">`
                : `<span class="account-avatar-fallback">${safeLogin.slice(0, 2).toUpperCase()}</span>`;
            accountStatus.innerHTML = `
                <div class="account-card">
                    ${avatar}
                    <div>
                        <div class="account-name">
                            ${safeLogin}
                            <span class="role-badge ${roleClass}">${roleText}</span>
                        </div>
                        <div class="account-note">${isAdmin ? '你可以上传、发布和删除文章。' : '你可以阅读文章，不能上传或删除。'}</div>
                    </div>
                </div>
            `;
            accountActions.innerHTML = '<button class="logout-btn" type="button" id="logoutBtn">退出登录</button>';
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await fetch('/auth/logout', { method: 'POST' });
                currentUser = null;
                isAdmin = false;
                renderAccount(adminLogin);
                await loadArticles();
            });
        }

        async function loadMe() {
            const loginResult = new URLSearchParams(window.location.search).get('login');
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                currentUser = data.user || null;
                isAdmin = Boolean(currentUser && currentUser.role === 'admin');
                renderAccount(data.adminLogin || '管理员账号');
                if (loginResult === 'failed') {
                    accountStatus.insertAdjacentHTML('beforeend', '<div class="account-note">GitHub 登录失败，请稍后重试。</div>');
                }
                if (loginResult) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            } catch (error) {
                currentUser = null;
                isAdmin = false;
                accountStatus.innerHTML = `<div class="account-note">登录状态加载失败：${escapeHtml(error.message)}</div>`;
                accountActions.innerHTML = '<a class="github-login-btn no-loader" href="/auth/github">重新登录 GitHub</a>';
            }
        }

        grid.addEventListener('click', async event => {
            const button = event.target.closest('.delete-article-btn');
            if (!button) return;
            if (!isAdmin) {
                statusEl.textContent = '只有管理员可以删除文章。';
                return;
            }

            const slug = button.dataset.slug;
            const title = button.dataset.title || slug;
            if (!window.confirm(`确定删除《${title}》吗？这会同时删除文章 HTML 和已本地化的图片。`)) {
                return;
            }

            statusEl.textContent = '正在删除...';
            try {
                const response = await fetch(`/api/admin/articles/${encodeURIComponent(slug)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || '删除失败');

                statusEl.textContent = `已删除：${title}`;
                await loadArticles();
            } catch (error) {
                statusEl.textContent = `删除失败：${error.message}`;
            }
        });

        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                const data = await response.json();
                renderArticles(data.articles || []);
            } catch (error) {
                statusEl.textContent = `加载文章失败：${error.message}`;
            }
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
                reader.readAsText(file, 'utf-8');
            });
        }

        form.addEventListener('submit', async event => {
            event.preventDefault();
            if (!isAdmin) {
                statusEl.textContent = '只有管理员可以上传文章。';
                return;
            }
            const file = document.getElementById('articleFile').files[0];
            if (!file) return;

            statusEl.textContent = '正在上传...';
            try {
                const html = await readFileAsText(file);
                const payload = {
                    title: document.getElementById('articleTitle').value,
                    slug: document.getElementById('articleSlug').value,
                    summary: document.getElementById('articleSummary').value,
                    html
                };

                const response = await fetch('/api/admin/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || '上传失败');

                const failures = data.article.imageFailures || [];
                statusEl.textContent = failures.length
                    ? `已发布：${data.article.title}，本地化 ${data.article.localImageCount || 0} 张图片；${failures.length} 张图片下载失败。`
                    : `已发布：${data.article.title}，本地化 ${data.article.localImageCount || 0} 张图片。`;
                form.reset();
                await loadArticles();
            } catch (error) {
                statusEl.textContent = `上传失败：${error.message}`;
            }
        });

        async function initPage() {
            await loadMe();
            await loadArticles();
        }

        initPage();
    </script>
</body>
</html>
