<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conscient-关于</title>
    <link rel="icon" type="image/png" href="../tx.png">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background: url('../newbanner.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            overflow: auto;
        }
        
        .about-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 118px 20px 40px;
            position: relative;
        }
        
        .about-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('../newbanner.jpg') center/cover no-repeat;
        }
        
        .about-main-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        
        .avatar-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid #fff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        
        .avatar-circle:hover {
            transform: scale(1.05);
        }
        
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .contact-card {
            background: #fff;
            border: 4px solid #000;
            padding: 22px 24px;
            width: min(430px, calc(100vw - 48px));
            box-sizing: border-box;
            margin-top: 0;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.3);
        }
        
        .contact-card h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #000;
            text-align: center;
        }
        
        .contact-info {
            display: grid;
            gap: 9px;
            width: fit-content;
            margin: 0 auto;
        }
        
        .contact-row {
            display: grid;
            grid-template-columns: 92px max-content;
            align-items: baseline;
            gap: 42px;
            padding: 5px 0;
        }
        
        .contact-label {
            font-weight: bold;
            color: #4a4a4a;
            text-align: right;
        }
        
        .contact-value,
        .contact-value a {
            font-size: 1rem;
            color: #333;
        }
        
        .contact-value a {
            color: #214e63;
            text-decoration: none;
            font-weight: normal;
            word-break: break-word;
        }
        
        .contact-value a:hover {
            color: #123847;
            text-decoration: underline;
        }
        
        @media (max-width: 520px) {
            .contact-info {
                width: 100%;
            }
            
            .contact-row {
                grid-template-columns: minmax(78px, 0.8fr) minmax(0, 1.2fr);
                gap: 20px;
            }
        }
        
        .bubbles-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #000;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #000;
            cursor: pointer;
            user-select: none;
            pointer-events: auto;
            transition: transform 0.2s ease;
        }
        
        .bubble:hover {
            transform: scale(1.1);
        }
        
        .bubble.interactive {
            background: rgba(255, 255, 255, 0.9);
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <!-- 全局导航栏 -->
    <div class="nav-hover-zone" id="navHoverZone"></div>
    <nav class="top-nav collapsed" id="globalNav">
        <div class="nav-left">
            <span class="nav-logo">
                <span class="letter-red">C</span><span class="letter-yellow">o</span><span class="letter-blue">n</span><span class="letter-black">s</span><span class="letter-red">c</span><span class="letter-yellow">i</span><span class="letter-blue">e</span><span class="letter-black">n</span><span class="letter-red">t</span>
            </span>
        </div>
        <div class="nav-center">
            <div class="nav-item" onclick="window.location.href='../index.html#section2'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </span>
                <span class="nav-text">主页</span>
            </div>
            <div class="nav-item" onclick="window.location.href='../friends/'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </span>
                <span class="nav-text">友链</span>
            </div>
            <div class="nav-item active" onclick="window.location.href='../about/'">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <span class="nav-text">关于</span>
            </div>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="折叠导航" style="display: none;">﹀</button>
    </nav>

    <div class="about-page">
        <div class="about-background"></div>
        <div class="about-main-content">
            <div class="avatar-container">
                <div class="avatar-circle">
                    <img src="../tx.png" alt="Conscient 头像" class="avatar-img">
                </div>
                <!-- 联系方式卡片 -->
                <div class="contact-card">

                    <h3>Contact Conscient</h3>
                    <div class="contact-info">
                        <div class="contact-row">
                            <span class="contact-label">Email</span>
                            <span class="contact-value">conscient@qq.com</span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">Instagram</span>
                            <span class="contact-value"><a href="https://www.instagram.com/conscientjoe/">conscientjoe</a></span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">GitHub</span>
                            <span class="contact-value"><a href="https://github.com/conscient2025">conscient2025</a></span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">bilibili</span>
                            <span class="contact-value"><a href="https://space.bilibili.com/1334620851">扬柿长</a></span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">公众号</span>
                            <span class="contact-value">扬柿长</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bubbles-container" id="bubblesContainer"></div>
        </div>
    </div>

    <!-- 留言气泡输入框 -->
    <div class="bubble-modal" id="bubbleModal">
        <div class="bubble-modal-content">
            <button class="bubble-modal-close" id="bubbleModalClose">&times;</button>
            <h3>写点什么</h3>
            <textarea id="bubbleInput" placeholder="点击漂浮的空白气泡来留言..."></textarea>
            <div class="bubble-modal-actions">
                <button id="bubbleSave">保存</button>
                <button id="bubbleCancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 页面切换加载动画 -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-square">
            <div class="loader-inner-square red"></div>
            <div class="loader-inner-square yellow"></div>
            <div class="loader-inner-square blue"></div>
            <div class="loader-inner-square white"></div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
